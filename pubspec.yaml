name: aplikasi_pendataan_desa
description: "aplikasi_pendataan_desa"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0' # Direkomendasikan untuk memperluas sedikit rentang SDK jika paket memerlukan versi Dart yang lebih baru

dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.8 # Versi ini masih cukup baru, ^1.0.6 atau ^1.0.8 baik
  get: ^4.6.6 # ^4.7.2 yang Anda miliki adalah versi yang lebih baru dari 4.6.6, jadi ^4.7.2 Anda baik. Jika ada 4.6.x, ini juga stabil.
  get_storage: ^2.1.1
  intl: ^0.19.0 # Atau versi 0.18.x jika ada isu dengan 0.19.x pada SDK Anda, tapi 0.19.0 seharusnya OK

  # Firebase (pastikan semua versi firebase_bom kompatibel satu sama lain jika menggunakan bom)
  # Atau tentukan versi individual yang kompatibel
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0

  # Charts & Calendar
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Device & File System
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  open_filex: ^4.4.0 # Pastikan nama paketnya open_filex, bukan open_file
  file_picker: ^8.0.6
  device_info_plus: ^10.1.0

  # Data Handling
  csv: ^6.0.0
  excel: ^4.0.4 # atau ^5.0.0 jika sudah rilis dan stabil

  # Unique ID (jika yang Anda maksud adalah paket uuid)
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0 # ^6.0.0 yang Anda miliki adalah versi yang sangat baru, jika itu stabil maka bagus. ^3.0.0 atau ^4.0.0 juga umum.
  flutter_launcher_icons: ^0.13.1 # ^0.14.3 yang Anda miliki lebih baru dan seharusnya baik.

# Konfigurasi untuk flutter_launcher_icons sudah benar di bawah ini
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false # Set ke true jika Anda juga ingin generate untuk iOS
  image_path: "assets/images/splashpage_1.png"
  min_sdk_android: 23 # Pastikan ini sesuai dengan minSdk aplikasi Anda
  # adaptive_icon_background: "#ffffff"
  # adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/bps.png
    - assets/images/DaunSS.png
    - assets/images/undraw_mobile-ux_5h2w.png
    - assets/images/SensusKu.png
    - assets/images/Profile.png
    - assets/images/Supportedby.png
    - assets/images/SS.png
    - assets/images/splashpage_1.png
    - assets/images/splashpage.png
    - assets/images/pemkotbatu.png
    - assets/images/LogoUmm.png
    - assets/images/Umm.png
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic