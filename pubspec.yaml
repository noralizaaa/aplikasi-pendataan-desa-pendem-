name: aplikasi_pendataan_desa
description: "aplikasi_pendataan_desa"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  get_storage: ^2.1.1
  intl: ^0.19.0
  collection: ^1.18.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.4.10
  firebase_app_check: ^0.3.2+10

  # Charts & Calendar
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Device & File System
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^11.3.1
  open_filex: ^4.4.0
  file_picker: ^8.0.6
  device_info_plus: any
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Data Handling
  csv: ^6.0.0
  excel: ^4.0.4

  # Unique ID
  uuid: ^4.4.2

  # Networking
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  windows: "launcher_icon"
  ios: false
  image_path: "assets/images/splashpage_1.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/images/bps.png
    - assets/images/DaunSS.png
    - assets/images/undraw_mobile-ux_5h2w.png
    - assets/images/SensusKu.png
    - assets/images/Profile.png
    - assets/images/Supportedby.png
    - assets/images/SS.png
    - assets/images/splashpage_1.png
    - assets/images/splashpage.png
    - assets/images/pemkotbatu.png
    - assets/images/LogoUmm.png
    - assets/images/Umm.png